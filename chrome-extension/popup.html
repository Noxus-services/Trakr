<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trakr Prospector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: #1e293b;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: #2563eb;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 18px; height: 18px; color: white; }
    .header-text h1 { font-size: 14px; font-weight: 700; color: white; }
    .header-text p { font-size: 11px; color: #94a3b8; }

    .content { padding: 14px; }

    .stat-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      flex: 1;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .stat .val { font-size: 22px; font-weight: 800; color: #2563eb; }
    .stat .lbl { font-size: 10px; color: #64748b; margin-top: 2px; }

    .last-capture {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .last-capture h3 { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .prospect-item {
      display: flex; align-items: center; gap-8px;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      gap: 8px;
    }
    .prospect-item:last-child { border-bottom: none; }
    .prospect-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2563eb;
      flex-shrink: 0;
    }
    .prospect-name { font-size: 12px; font-weight: 500; color: #1e293b; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prospect-src { font-size: 10px; color: #94a3b8; flex-shrink: 0; }

    .empty-state { text-align: center; padding: 16px 0; color: #94a3b8; font-size: 12px; }

    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      margin-bottom: 6px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%;
      background: white;
      color: #475569;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 9px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-secondary:hover { background: #f1f5f9; }

    .tip {
      margin-top: 10px;
      padding: 8px 10px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      font-size: 11px;
      color: #1d4ed8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Trakr Prospector</h1>
      <p>Prospection B2B nuisibles</p>
    </div>
  </div>

  <div class="content">
    <div class="stat-row">
      <div class="stat">
        <div class="val" id="count-total">—</div>
        <div class="lbl">Prospects</div>
      </div>
      <div class="stat">
        <div class="val" id="count-pending" style="color:#f59e0b">—</div>
        <div class="lbl">En attente</div>
      </div>
    </div>

    <div class="last-capture">
      <h3>Derniers capturés</h3>
      <div id="recent-list">
        <div class="empty-state">Aucune capture récente</div>
      </div>
    </div>

    <a href="https://trakr-prospector.vercel.app" target="_blank" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
      Ouvrir Trakr Prospector
    </a>
    <button class="btn-secondary" id="btn-sync">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Synchroniser les données
    </button>

    <div class="tip">
      💡 Naviguez sur <strong>Google Maps</strong> ou <strong>PagesJaunes</strong> — un bouton "Sauvegarder dans Trakr" apparaîtra sur chaque fiche.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
